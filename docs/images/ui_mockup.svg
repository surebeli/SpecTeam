<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="SpecTeam VS Code extension — Divergence Review sidebar" font-family="'Segoe UI', 'Inter', -apple-system, Aptos, Arial, sans-serif">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f2530"/>
      <stop offset="100%" stop-color="#181c24"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2430"/>
      <stop offset="100%" stop-color="#12161e"/>
    </linearGradient>
  </defs>

  <!-- Window shell -->
  <rect width="1280" height="720" rx="12" fill="#0b0d12"/>
  <rect x="0" y="0" width="1280" height="40" fill="#111620"/>
  <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="66" cy="20" r="6" fill="#28c840"/>
  <text x="640" y="25" fill="#7a8296" font-size="13" text-anchor="middle">SpecTeam — Visual Studio Code</text>

  <!-- Activity bar -->
  <rect x="0" y="40" width="56" height="680" fill="#1b1f28"/>
  <!-- generic icons -->
  <g fill="none" stroke="#6b7487" stroke-width="1.6">
    <rect x="16" y="76" width="24" height="20" rx="2"/>
    <circle cx="28" cy="136" r="10"/>
    <path d="M16 188h24M16 196h18M16 204h24"/>
    <rect x="16" y="248" width="24" height="24" rx="4"/>
  </g>
  <!-- active SpecTeam icon (phoenix-spec mark) -->
  <g transform="translate(18 308)">
    <rect x="-4" y="-4" width="28" height="28" rx="6" fill="#0f1a2c" stroke="#ff7a34" stroke-opacity="0.6"/>
    <g fill="none" stroke="#ff8a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 16C2 10 6 4 12 2"/>
      <path d="M6 18C10 14 16 12 20 14"/>
    </g>
    <path d="M12 6l8 4-4 8-6-3z" fill="none" stroke="#5fe0be" stroke-width="1.4"/>
  </g>
  <rect x="0" y="304" width="3" height="28" fill="#ff7a34"/>

  <!-- Sidebar (SpecTeam view) -->
  <rect x="56" y="40" width="356" height="680" fill="url(#shell)"/>
  <text x="80" y="76" fill="#e8ecf6" font-size="11" letter-spacing="2" font-weight="700">SPECTEAM</text>
  <text x="384" y="76" fill="#6b7487" font-size="13" text-anchor="end">…</text>

  <!-- Section header -->
  <g transform="translate(72 100)">
    <path d="M0 8l6-6 6 6z" fill="#8892a6"/>
    <text x="20" y="10" fill="#e8ecf6" font-size="13" font-weight="600">Divergence Review</text>
    <g transform="translate(300 0)" fill="none" stroke="#8892a6" stroke-width="1.4">
      <path d="M0 4a4 4 0 108 0 4 4 0 00-8 0z"/>
      <path d="M4 0v8M0 4h8" transform="translate(0 0)"/>
    </g>
  </g>

  <!-- Tree items -->
  <!-- Open D-001 -->
  <g transform="translate(88 140)">
    <circle cx="10" cy="10" r="7" fill="none" stroke="#f14c4c" stroke-width="1.8"/>
    <text x="28" y="14" fill="#e8ecf6" font-size="13" font-weight="600">D-001:</text>
    <text x="78" y="14" fill="#dbe1ef" font-size="13">Auth flow — REST vs GraphQL</text>
    <text x="300" y="14" fill="#f14c4c" font-size="11" font-weight="600">open</text>
  </g>

  <!-- Open D-002 -->
  <g transform="translate(88 172)">
    <circle cx="10" cy="10" r="7" fill="none" stroke="#f14c4c" stroke-width="1.8"/>
    <text x="28" y="14" fill="#e8ecf6" font-size="13" font-weight="600">D-002:</text>
    <text x="78" y="14" fill="#dbe1ef" font-size="13">Session storage — cookie vs JWT</text>
    <text x="300" y="14" fill="#f14c4c" font-size="11" font-weight="600">open</text>
  </g>

  <!-- Proposed D-003 -->
  <g transform="translate(88 204)">
    <!-- git-pull-request glyph -->
    <g fill="none" stroke="#f9c74f" stroke-width="1.8" stroke-linecap="round">
      <circle cx="5" cy="5" r="3"/>
      <circle cx="5" cy="16" r="3"/>
      <path d="M5 8v5"/>
      <circle cx="16" cy="16" r="3"/>
      <path d="M16 13V8a3 3 0 00-3-3"/>
    </g>
    <text x="28" y="14" fill="#e8ecf6" font-size="13" font-weight="600">D-003:</text>
    <text x="78" y="14" fill="#dbe1ef" font-size="13">Pricing model — tiered vs usage</text>
    <text x="284" y="14" fill="#f9c74f" font-size="11" font-weight="600">proposed</text>
  </g>

  <!-- Proposed D-004 -->
  <g transform="translate(88 236)">
    <g fill="none" stroke="#f9c74f" stroke-width="1.8" stroke-linecap="round">
      <circle cx="5" cy="5" r="3"/>
      <circle cx="5" cy="16" r="3"/>
      <path d="M5 8v5"/>
      <circle cx="16" cy="16" r="3"/>
      <path d="M16 13V8a3 3 0 00-3-3"/>
    </g>
    <text x="28" y="14" fill="#e8ecf6" font-size="13" font-weight="600">D-004:</text>
    <text x="78" y="14" fill="#dbe1ef" font-size="13">Event schema — CloudEvents vs custom</text>
    <text x="284" y="14" fill="#f9c74f" font-size="11" font-weight="600">proposed</text>
  </g>

  <!-- Resolved D-005 -->
  <g transform="translate(88 268)">
    <path d="M3 11l5 5 10-12" fill="none" stroke="#5fe0be" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="14" fill="#a8b0c2" font-size="13" font-weight="600">D-005:</text>
    <text x="78" y="14" fill="#a8b0c2" font-size="13">Deploy target — Docker baseline</text>
    <text x="290" y="14" fill="#5fe0be" font-size="11" font-weight="600">resolved</text>
  </g>

  <!-- Resolved D-006 -->
  <g transform="translate(88 300)">
    <path d="M3 11l5 5 10-12" fill="none" stroke="#5fe0be" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="14" fill="#a8b0c2" font-size="13" font-weight="600">D-006:</text>
    <text x="78" y="14" fill="#a8b0c2" font-size="13">Secret store — Vault only</text>
    <text x="290" y="14" fill="#5fe0be" font-size="11" font-weight="600">resolved</text>
  </g>

  <!-- Counts footer in sidebar -->
  <g transform="translate(88 560)">
    <text fill="#6b7487" font-size="11" letter-spacing="1" font-weight="600">SUMMARY</text>
    <g transform="translate(0 20)">
      <circle cx="6" cy="9" r="5" fill="none" stroke="#f14c4c" stroke-width="1.6"/>
      <text x="20" y="13" fill="#dbe1ef" font-size="12">Open</text>
      <text x="280" y="13" fill="#f14c4c" font-size="12" font-weight="700" text-anchor="end">2</text>
    </g>
    <g transform="translate(0 42)">
      <circle cx="6" cy="9" r="5" fill="none" stroke="#f9c74f" stroke-width="1.6"/>
      <text x="20" y="13" fill="#dbe1ef" font-size="12">Proposed</text>
      <text x="280" y="13" fill="#f9c74f" font-size="12" font-weight="700" text-anchor="end">2</text>
    </g>
    <g transform="translate(0 64)">
      <path d="M1 9l4 4 8-10" fill="none" stroke="#5fe0be" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="13" fill="#dbe1ef" font-size="12">Resolved</text>
      <text x="280" y="13" fill="#5fe0be" font-size="12" font-weight="700" text-anchor="end">2</text>
    </g>
  </g>

  <!-- Editor pane -->
  <rect x="412" y="40" width="868" height="680" fill="url(#editor)"/>

  <!-- Tabs -->
  <g transform="translate(412 40)">
    <rect width="868" height="36" fill="#12161e"/>
    <rect x="0" y="0" width="220" height="36" fill="#1e2430"/>
    <text x="16" y="23" fill="#e8ecf6" font-size="12">DIVERGENCES.md</text>
    <text x="204" y="23" fill="#6b7487" font-size="13" text-anchor="end">×</text>
    <rect x="220" y="0" width="220" height="36" fill="#161a22"/>
    <text x="236" y="23" fill="#8892a6" font-size="12">THESIS.md</text>
    <rect x="0" y="35" width="220" height="1" fill="#ff7a34" opacity="0.7"/>
  </g>

  <!-- Breadcrumbs -->
  <text x="432" y="94" fill="#6b7487" font-size="11">.spec &gt; DIVERGENCES.md</text>

  <!-- Document content: D-001 detail -->
  <g transform="translate(432 120)" font-family="'JetBrains Mono', 'Cascadia Code', Consolas, monospace">
    <text fill="#c6cee0" font-size="20" font-weight="700" font-family="'Segoe UI', 'Inter', sans-serif">D-001: Auth flow — REST vs GraphQL</text>

    <g transform="translate(0 36)">
      <rect x="0" y="0" width="68" height="22" rx="11" fill="#2b1415" stroke="#f14c4c" stroke-opacity="0.6"/>
      <text x="34" y="15" fill="#f79b9b" font-size="11" font-weight="700" text-anchor="middle">OPEN</text>
      <text x="84" y="16" fill="#8892a6" font-size="12">Priority: high · Surfaced from alice/api-design.md vs bob/api-design.md</text>
    </g>

    <g transform="translate(0 84)" fill="#b9c1d3" font-size="13">
      <text font-weight="700" fill="#e8ecf6">Context</text>
      <text y="24">alice proposes REST + cookie-session. bob proposes GraphQL + JWT bearer.</text>
      <text y="44">THESIS does not yet pin a protocol; the gateway choice affects retry semantics</text>
      <text y="64">and the offline-read story for mobile.</text>
    </g>

    <g transform="translate(0 184)" fill="#b9c1d3" font-size="13">
      <text font-weight="700" fill="#e8ecf6">Trade-offs</text>
      <text y="24">· REST: simpler caching, better CDN story, less typing per new endpoint.</text>
      <text y="44">· GraphQL: one round-trip composition, but heavier infra and auth complexity.</text>
    </g>

    <g transform="translate(0 260)" fill="#b9c1d3" font-size="13">
      <text font-weight="700" fill="#e8ecf6">Action</text>
      <text y="24" fill="#a8b0c2">Run</text>
      <rect x="30" y="10" width="168" height="22" rx="4" fill="#131823" stroke="#2a3144"/>
      <text x="38" y="26" fill="#9ad5ff" font-size="12" font-family="'JetBrains Mono', Consolas, monospace">/spec-align D-001</text>
      <text x="206" y="26" fill="#a8b0c2" font-size="13">to propose a decision.</text>
    </g>

    <g transform="translate(0 324)" fill="#6b7487" font-size="11">
      <text>Decision record will be written to .spec/decisions/D-001.md on approve.</text>
    </g>
  </g>

  <!-- Right-side align button affordance -->
  <g transform="translate(1160 134)">
    <rect x="-8" y="-16" width="96" height="28" rx="14" fill="#0f1a2c" stroke="#ff7a34" stroke-opacity="0.7"/>
    <path d="M2 -2l6 4-6 4z" fill="#ff9352"/>
    <text x="16" y="3" fill="#ffbf85" font-size="12" font-weight="700">Align</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="696" width="1280" height="24" fill="#0f1320"/>
  <text x="14" y="712" fill="#a8b0c2" font-size="11">⎇ main</text>
  <text x="76" y="712" fill="#a8b0c2" font-size="11">● alice</text>
  <text x="150" y="712" fill="#a8b0c2" font-size="11">SpecTeam: 2 open · 2 proposed · 2 resolved</text>
  <text x="1266" y="712" fill="#a8b0c2" font-size="11" text-anchor="end">UTF-8 · LF · Markdown</text>
</svg>
